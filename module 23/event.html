<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>event handler</title>
</head>
<body>
    <h1 id="page-title">Page title</h1>
    <button id="btn-update-title">click here</button>



    <br>
    <br>
    <br>
    <!-- handle input text -->

    <p id="name">No Name</p>
    <input id="input-name" placeholder="Your Name" type="text">
    <button id="name-update">update</button>

    <script>
        document.getElementById('name-update').addEventListener('click', function(){
            const nameInput = document.getElementById('input-name');
            console.log(nameInput)
            const name = nameInput.value;
            console.log('name', name)

            const namep =document.getElementById('name');
            namep.innerText = name; 


        })
    </script>
    

    <script src="./js/handlet.js"></script>
</body>
</html>
