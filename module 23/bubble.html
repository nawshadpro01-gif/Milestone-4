<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble event</title>
    <style>
        body{
            border: 2px solid  red;
            margin: 2px;
        }
        section{
            border: 2px solid  green;
            margin: 2px;
        }
        ol{
            border: 2px solid  purple;
            margin: 2px;
        }
        li{
            border: 2px solid  blue;
            margin: 2px;
        }
    </style>
</head>
<body id="body">
    <h2>Explore evemt bubble </h2>
    <section id="section-list">
        <h3>
            List of things
        </h3>
        <ol id="item-list">
            <li id="item-1">Lorem, ipsum.</li>
            <li id="item-2">Recusandae, quasi?</li>
            <li id="item-3">Vero, harum!</li>
            <li id="item-4">Ad, quas.</li>
            <li id="item-5">Accusamus, dolorem?</li>
            <li id="item-6">Obcaecati, deserunt.</li>
        </ol>
    </section>
    <script>
        document.getElementById('item-2').addEventListener('click', function(){
            console.log('item 2 clicked')
        })

        document.getElementById('item-list').addEventListener('click', function(){
            console.log('ol clicked')
        })
        
        document.getElementById('section-list').addEventListener('click', function(){
            console.log('section clicked')
        })
        document.getElementById('body').addEventListener('click', function(){
            console.log('body clicked')
        })

    </script>
</body>
</html>
